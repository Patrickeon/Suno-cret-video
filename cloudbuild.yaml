# Cloud Build — 백엔드/프론트 이미지 빌드 후 Artifact Registry 푸시
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=asia-northeast3,_REPO=suno,_BACKEND_URL=https://<백엔드-URL>
#
# 최초엔 _BACKEND_URL 을 모르므로: 1) 백엔드만 빌드/배포 → URL 확인
#   → 2) 그 URL 로 다시 submit 해서 프론트까지 빌드. (DEPLOY.md 참고)
substitutions:
  _REGION: asia-northeast3
  _REPO: suno
  _BACKEND_URL: http://localhost:8000

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend"

steps:
  - id: backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend"
      - .

  - id: frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - frontend/Dockerfile
      - --build-arg
      - "NEXT_PUBLIC_API_BASE=${_BACKEND_URL}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend"
      - frontend
